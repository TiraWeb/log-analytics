services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    platform: linux/amd64
    container_name: openobserve
    ports:
      - "5080:5080"
    environment:
      - ZO_ROOT_USER_EMAIL=admin@example.com
      - ZO_ROOT_USER_PASSWORD=admin123
      - ZO_DATA_DIR=/data
    volumes:
      - ./data/openobserve:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5080/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    platform: linux/amd64
    container_name: log-analytics-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - OPENOBSERVE_URL=http://openobserve:5080
    depends_on:
      openobserve:
        condition: service_healthy
    restart: unless-stopped
